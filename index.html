<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />

  <!-- 모바일 화면 크기 대응 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>게임 이벤트 캘린더</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />

  <!-- 내 CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 전체 영역 -->
  <div class="wrapper">

    <!-- 상단 영역 -->
    <div class="top-bar">
      <h1>게임 이벤트 스케줄</h1>

      <!-- 로그인 / 로그아웃 / 일정 추가 버튼 -->
      <div class="top-buttons">

        <button id="loginBtn">
          관리자 로그인
        </button>

        <button id="logoutBtn" class="hidden">
          로그아웃
        </button>

        <button id="addEventBtn" class="hidden">
          + 일정 추가
        </button>

      </div>
    </div>

    <!-- 로그인 상태 표시 -->
    <div id="loginStatus" class="login-status">
      방문자 모드
    </div>

    <!-- 일정 검색 영역 -->
    <div class="search-box">

      <input type="text" id="searchInput" placeholder="일정 검색..." />

      <button id="clearSearchBtn">
        초기화
      </button>

    </div>

    <!-- 캘린더 영역 -->
    <div id="calendar"></div>

  </div>



  <!-- 로그인 창 -->
  <div id="loginModal" class="modal hidden">

    <div class="modal-content">

      <h2>관리자 로그인</h2>

      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="이메일 입력" />

      <label>비밀번호</label>
      <input type="password" id="loginPassword" placeholder="비밀번호 입력" />

      <div class="buttons">

        <button id="submitLoginBtn">
          로그인
        </button>

        <button id="closeLoginBtn">
          닫기
        </button>

      </div>

    </div>

  </div>



  <!-- 메인 이벤트 편집창 -->
  <div id="eventModal" class="modal hidden">

    <div class="modal-content">

      <h2>이벤트 편집</h2>

      <!-- 제목 -->
      <label>제목</label>
      <input type="text" id="eventTitle" />

      <!-- 카테고리 -->
      <label>카테고리</label>
      <select id="eventCategory">
        <option value="업데이트">업데이트</option>
        <option value="픽업">픽업</option>
        <option value="복각">복각</option>
      </select>

      <!-- 시작일 -->
      <label>시작일</label>
      <input type="date" id="eventStart" />

      <!-- 종료일 -->
      <label>종료일</label>
      <input type="date" id="eventEnd" />

      <!-- 설명 -->
      <label>설명</label>
      <textarea id="eventDescription" placeholder="이벤트 설명 입력"></textarea>

      <!-- 이미지 업로드 -->
      <label>이미지 업로드</label>
      <input type="file" id="eventImage" />

      <!-- 이미지 미리보기 -->
      <img id="previewImage" />

      <div class="buttons">

        <button id="saveBtn">
          저장
        </button>

        <button id="deleteBtn">
          삭제
        </button>

        <button id="closeEventBtn">
          닫기
        </button>

      </div>

    </div>

  </div>



  <!-- 이벤트 상세창 -->
  <div id="detailModal" class="modal hidden">

    <div class="modal-content detail-content detail-modal-content">

      <!-- 관리자 전용 메인 이벤트 수정 버튼 -->
      <button
        id="editMainEventBtn"
        class="edit-main-icon hidden"
        title="메인 이벤트 수정"
      >
        ✏️
      </button>

      <!-- 상세 팝업 큰 배너 이미지 -->
      <img id="detailImage" class="detail-image" />

      <!-- 상세 제목 영역 -->
      <div class="detail-header">

        <div id="detailCategory"></div>

        <h2 id="detailTitle"></h2>

      </div>

      <div id="detailPeriod" class="detail-period"></div>

      <p id="detailDescription" class="detail-description"></p>

      <div class="detail-section-title">
        하위 이벤트
      </div>

      <div id="subEventList" class="sub-event-list"></div>

      <div class="buttons detail-buttons">

        <button id="addSubEventBtn" class="hidden">
          + 하위 이벤트 추가
        </button>

        <button id="closeDetailBtn">
          닫기
        </button>

      </div>

    </div>

  </div>



  <!-- 하위 이벤트 편집창 -->
  <div id="subEventModal" class="modal hidden">

    <div class="modal-content">

      <h2>하위 이벤트 편집</h2>

      <label>제목</label>
      <input type="text" id="subEventTitle" />

      <label>카테고리</label>
      <select id="subEventCategory">
        <option value="업데이트">업데이트</option>
        <option value="픽업">픽업</option>
        <option value="복각">복각</option>
      </select>

      <label>시작일</label>
      <input type="date" id="subEventStart" />

      <label>종료일</label>
      <input type="date" id="subEventEnd" />

      <label>설명</label>
      <textarea id="subEventDescription" placeholder="하위 이벤트 설명 입력"></textarea>

      <label>이미지 업로드</label>
      <input type="file" id="subEventImage" />

      <img id="subPreviewImage" />

      <div class="buttons">

        <button id="saveSubEventBtn">
          저장
        </button>

        <button id="deleteSubEventBtn">
          삭제
        </button>

        <button id="closeSubEventBtn">
          닫기
        </button>

      </div>

    </div>

  </div>



  <!-- 저장 완료 알림 -->
  <div id="toast">
    저장 완료
  </div>



  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 내 JS -->
  <script src="script.js"></script>

</body>

</html>
