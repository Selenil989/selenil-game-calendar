<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />

  <!-- 모바일 화면 크기 대응 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>게임 이벤트 캘린더</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />

  <!-- 내 CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 전체 영역 -->
  <div class="wrapper">

    <!-- 상단 영역 -->
    <div class="top-bar">
      <div class="site-title-row">
        <h1 id="calendarMainTitle">게임 이벤트 스케줄</h1>

        <!-- 관리자 전용 캘린더 제목 / 상단 이미지 설정 버튼 -->
        <button id="editCalendarSettingsBtn" class="edit-calendar-settings-btn hidden" title="캘린더 설정">
          ✏️
        </button>
      </div>

      <!-- 로그인 / 로그아웃 / 일정 추가 버튼 -->
      <div class="top-buttons">

        <button id="loginBtn">
          관리자 로그인
        </button>

        <button id="logoutBtn" class="hidden">
          로그아웃
        </button>

        <button id="addEventBtn" class="hidden">
          + 일정 추가
        </button>

      </div>
    </div>

    <!-- 로그인 상태 표시 -->
    <div id="loginStatus" class="login-status">
      방문자 모드
    </div>

    <!-- 캘린더 상단 이미지 영역 -->
    <div id="calendarHeroList" class="calendar-hero-list"></div>

    <!-- 일정 검색 영역 -->
    <div class="search-box">

      <input type="text" id="searchInput" placeholder="일정 검색..." />

      <button id="clearSearchBtn">
        초기화
      </button>

    </div>

    <!-- 캘린더 영역 -->
    <div id="calendar"></div>

  </div>



  <!-- 로그인 창 -->
  <div id="loginModal" class="modal hidden">

    <div class="modal-content">

      <h2>관리자 로그인</h2>

      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="이메일 입력" />

      <label>비밀번호</label>
      <input type="password" id="loginPassword" placeholder="비밀번호 입력" />

      <div class="buttons">

        <button id="submitLoginBtn">
          로그인
        </button>

        <button id="closeLoginBtn">
          닫기
        </button>

      </div>

    </div>

  </div>



  <!-- 메인 이벤트 편집창 -->
  <div id="eventModal" class="modal hidden">

    <div class="modal-content">

      <h2>이벤트 편집</h2>

      <details class="editor-section" open>
        <summary>기본 정보</summary>

        <label>제목</label>
        <input type="text" id="eventTitle" />

        <label>카테고리</label>
        <select id="eventCategory">
          <option value="업데이트">업데이트</option>
          <option value="픽업">픽업</option>
          <option value="복각">복각</option>
          <option value="공방">공방</option>
        </select>

        <label>시작일</label>
        <input type="date" id="eventStart" />

        <label>종료일</label>
        <input type="date" id="eventEnd" />

        <label>설명</label>
        <textarea id="eventDescription" placeholder="이벤트 설명 입력"></textarea>
      </details>

      <details class="editor-section hero-style-section">
        <summary>메인 이벤트 텍스트 스타일</summary>

        <div class="compact-style-grid">
          <div>
            <label>텍스트 색상</label>
            <input type="color" id="eventTextColor" value="#ffffff" />
          </div>

          <div>
            <label>배경색</label>
            <input type="color" id="eventTextBgColor" value="#000000" />
          </div>
        </div>

        <label>배경 투명도</label>
        <input type="range" id="eventTextBgAlpha" min="0" max="100" value="35" />

        <label>텍스트 크기</label>
        <input type="range" id="eventTextSize" min="9" max="28" value="13" />
      </details>

      <details class="editor-section hero-style-section image-style-section">
        <summary>메인 이미지</summary>

        <div class="hero-editor-card">
          <label>이미지 업로드</label>
          <input type="file" id="eventImage" />
        </div>

        <label>이미지 가로 위치</label>
        <input type="range" id="eventImagePosX" min="0" max="100" value="50" />

        <label>이미지 세로 위치</label>
        <input type="range" id="eventImagePosY" min="0" max="100" value="50" />

        <label>이미지 확대</label>
        <input type="range" id="eventImageZoom" min="100" max="200" value="100" />
      </details>

      <details class="editor-section hero-style-section image-style-section">
        <summary>메인 배너 안 하위 이벤트 이미지</summary>

        <div class="hero-editor-card">
          <label>하위 이벤트 선택</label>
          <select id="mainSubCalendarSelect">
            <option value="">하위 이벤트 없음</option>
          </select>
        </div>

        <label>하위 배너 이미지 가로 위치</label>
        <input type="range" id="mainSubCalendarImagePosX" min="0" max="100" value="50" />

        <label>하위 배너 이미지 세로 위치</label>
        <input type="range" id="mainSubCalendarImagePosY" min="0" max="100" value="50" />

        <label>하위 배너 이미지 확대</label>
        <input type="range" id="mainSubCalendarImageZoom" min="100" max="200" value="100" />
      </details>

      <div class="buttons">

        <button id="saveBtn">
          저장
        </button>

        <button id="deleteBtn">
          삭제
        </button>

        <button id="closeEventBtn">
          닫기
        </button>

      </div>

    </div>

  </div>



  <!-- 이벤트 상세창 -->
  <div id="detailModal" class="modal hidden">

    <div class="modal-content detail-content detail-modal-content">

      <!-- 상세 팝업 큰 배너 이미지 영역 -->
      <div class="detail-image-wrap">

        <!-- 상세 팝업 큰 배너 이미지 -->
        <img id="detailImage" class="detail-image" />

        <!-- 관리자 전용 메인 이벤트 수정 버튼 -->
        <button id="editMainEventBtn" class="edit-main-icon hidden" title="메인 이벤트 수정">
          ✏️
        </button>

      </div>

      <!-- 상세 제목 영역 -->
      <div class="detail-header">

        <div id="detailCategory"></div>

        <h2 id="detailTitle"></h2>

      </div>

      <div id="detailPeriod" class="detail-period"></div>

      <p id="detailDescription" class="detail-description"></p>

      <div class="detail-section-title">
        픽업 일정
      </div>

      <div id="subEventList" class="sub-event-list"></div>

      <div class="buttons detail-buttons">

        <button id="addSubEventBtn" class="hidden">
          + 하위 이벤트 추가
        </button>

        <button id="closeDetailBtn">
          닫기
        </button>

      </div>

    </div>

  </div>



  <!-- 하위 이벤트 편집창 -->
  <div id="subEventModal" class="modal hidden">

    <div class="modal-content">

      <h2>하위 이벤트 편집</h2>

      <details class="editor-section" open>
        <summary>기본 정보</summary>

        <label>제목</label>
        <input type="text" id="subEventTitle" />

        <label>카테고리</label>
        <select id="subEventCategory">
          <option value="업데이트">업데이트</option>
          <option value="픽업">픽업</option>
          <option value="복각">복각</option>
          <option value="공방">공방</option>
        </select>

        <label>시작일</label>
        <input type="date" id="subEventStart" />

        <label>종료일</label>
        <input type="date" id="subEventEnd" />

        <label>설명</label>
        <textarea id="subEventDescription" placeholder="하위 이벤트 설명 입력"></textarea>
      </details>

      <details class="editor-section hero-style-section">
        <summary>서브 이벤트 텍스트 스타일</summary>

        <div class="compact-style-grid">
          <div>
            <label>텍스트 색상</label>
            <input type="color" id="subTextColor" value="#ffffff" />
          </div>

          <div>
            <label>배경색</label>
            <input type="color" id="subTextBgColor" value="#000000" />
          </div>
        </div>

        <label>배경 투명도</label>
        <input type="range" id="subTextBgAlpha" min="0" max="100" value="35" />

        <label>텍스트 크기</label>
        <input type="range" id="subTextSize" min="9" max="28" value="13" />
      </details>

      <details class="editor-section hero-style-section image-style-section">
        <summary>서브 이벤트 이미지</summary>

        <div class="hero-editor-card">
          <label>이미지 업로드</label>
          <input type="file" id="subEventImage" />
        </div>

        <label>이미지 가로 위치</label>
        <input type="range" id="subImagePosX" min="0" max="100" value="50" />

        <label>이미지 세로 위치</label>
        <input type="range" id="subImagePosY" min="0" max="100" value="50" />

        <label>이미지 확대</label>
        <input type="range" id="subImageZoom" min="100" max="200" value="100" />
      </details>

      <div class="buttons">

        <button id="saveSubEventBtn">
          저장
        </button>

        <button id="deleteSubEventBtn">
          삭제
        </button>

        <button id="closeSubEventBtn">
          닫기
        </button>

      </div>

    </div>

  </div>






  <!-- 캘린더 제목 / 상단 이미지 / 텍스트 스타일 설정창 -->
  <div id="calendarSettingsModal" class="modal hidden">

    <div class="modal-content calendar-settings-content">

      <h2>캘린더 설정</h2>

      <details class="editor-section" open>
        <summary>캘린더 이름</summary>

        <label>캘린더 이름</label>
        <input type="text" id="calendarTitleInput" placeholder="캘린더 이름 입력" />
      </details>

      <details class="editor-section hero-style-section calendar-hero-upload-section" open>
        <summary>상단 이미지 / 텍스트</summary>

        <p class="settings-help-text">
          최대 5개까지 등록 가능. 선택한 이미지 1개만 편집합니다.
        </p>

        <div class="hero-slot-toolbar">
          <select id="calendarHeroSelect">
            <option value="">상단 이미지 없음</option>
          </select>

          <button type="button" id="addCalendarHeroBtn" class="hero-mini-btn">
            + 이미지 추가
          </button>
        </div>

        <div id="calendarHeroEditor" class="single-hero-editor hidden">

          <div class="hero-editor-preview-card">
            <div class="hero-editor-preview" id="calendarHeroEditorPreview">
              <span class="hero-editor-empty">미리보기</span>
            </div>
          </div>

          <div class="hero-editor-card">
            <label>이미지 업로드</label>
            <input type="file" id="calendarHeroImageInput" accept="image/*" />
          </div>

          <label>텍스트</label>
          <input type="text" id="calendarHeroTextInput" placeholder="상단 이미지 텍스트" />

          <label>이미지 가로 위치</label>
          <input type="range" id="calendarHeroPosX" min="0" max="100" value="50" />

          <label>이미지 세로 위치</label>
          <input type="range" id="calendarHeroPosY" min="0" max="100" value="50" />

          <label>이미지 확대</label>
          <input type="range" id="calendarHeroZoom" min="100" max="200" value="100" />

          <div class="compact-style-grid hero-single-style-grid">
            <div>
              <label>텍스트 색상</label>
              <input type="color" id="calendarHeroTextColor" value="#ffffff" />
            </div>

            <div>
              <label>배경색</label>
              <input type="color" id="calendarHeroTextBgColor" value="#000000" />
            </div>
          </div>

          <label>배경 투명도</label>
          <input type="range" id="calendarHeroTextBgAlpha" min="0" max="100" value="35" />

          <label>텍스트 크기</label>
          <input type="range" id="calendarHeroTextSize" min="9" max="32" value="13" />

          <button type="button" id="deleteCalendarHeroBtn" class="hero-delete-btn">
            선택 이미지 삭제
          </button>

        </div>
      </details>

      <!-- 전체 텍스트 기본 스타일 값은 내부 기본값으로 유지합니다. -->
      <input type="hidden" id="defaultTextColorInput" value="#ffffff" />
      <input type="hidden" id="defaultTextBgColorInput" value="#000000" />
      <input type="hidden" id="defaultTextBgAlphaInput" value="35" />
      <input type="hidden" id="defaultTextSizeInput" value="13" />

      <div class="buttons">

        <button id="saveCalendarSettingsBtn">
          저장
        </button>

        <button id="closeCalendarSettingsBtn">
          닫기
        </button>

      </div>

    </div>

  </div>



  <!-- 저장 완료 알림 -->
  <div id="toast">
    저장 완료
  </div>



  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 내 JS -->
  <script src="script.js"></script>

</body>

</html>
